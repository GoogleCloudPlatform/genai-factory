name: gf-ae-hp-0

# Enable APIs
services:
  # Needed by Agent Engine for PSC-I in shared VPC
  - aiplatform.googleapis.com
  - compute.googleapis.com
  - dns.googleapis.com
  # Needed for SWP if you set network_config.create in 1-apps
  - networksecurity.googleapis.com
  - networkservices.googleapis.com

# Grant roles
iam_by_principals:
  $iam_principals:service_agents/_self_/aiplatform:
    - roles/compute.networkAdmin
  # Service agent roles needed for Agent Engine PSC-I.
  $iam_principals:service_agents/service-01/aiplatform:
    - roles/dns.peer
