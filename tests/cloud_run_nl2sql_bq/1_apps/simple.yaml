outputs:
  commands: "  # Run the following commands to deploy the application.\n  # Alternatively,\
    \ deploy the application through your CI/CD pipeline.\n\n  gcloud artifacts repositories\
    \ create nl2sql-0 \\\n    --project=your-project \\\n    --location europe-west1\
    \ \\\n    --repository-format docker \\\n    --impersonate-service-account=iac-rw@prefix-gf-srun-0.iam.gserviceaccount.com\n\
    \n  # Cloud Run\n  gcloud builds submit ./apps/nl2sql \\\n    --project your-project\
    \ \\\n    --tag europe-west1-docker.pkg.dev/your-project/nl2sql-0 \\\n    --service-account\
    \ projects/prefix-gf-srun-0/serviceAccounts/nl2sql-build-0@prefix-gf-srun-0.iam.gserviceaccount.com\
    \ \\\n    --default-buckets-behavior=REGIONAL_USER_OWNED_BUCKET \\\n    --region\
    \ europe-west1 \\\n    --quiet \\\n    --impersonate-service-account=iac-rw@prefix-gf-srun-0.iam.gserviceaccount.com\n\
    \n  gcloud run deploy nl2sql-0 \\\n    --impersonate-service-account=iac-rw@prefix-gf-srun-0.iam.gserviceaccount.com\
    \ \\\n    --project your-project \\\n    --region europe-west1 \\\n    --container=frontend\
    \ \\\n    --image=europe-west1-docker.pkg.dev/your-project/nl2sql-0 \\\n    --set-env-vars\
    \ BQ_DATA_PROJECT_ID=bigquery-public-data,BQ_DATASET_ID=thelook_ecommerce,DB_SA=nl2sql-0@prefix-gf-srun-0.iam,PROJECT_ID=your-project,REGION=europe-west1\n"
  ip_addresses: __missing__
