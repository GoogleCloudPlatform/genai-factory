name: gf-gecx-as-0

# Enable APIs
services:
  - ces.googleapis.com
  - discoveryengine.googleapis.com
  - dialogflow.googleapis.com
  # Needed for Cloud Function / Cloud Run deployments
  - artifactregistry.googleapis.com
  - cloudbuild.googleapis.com
  - cloudfunctions.googleapis.com
  - logging.googleapis.com
  - run.googleapis.com
  # Needed for Service Directory DNS zone and internal load balancer resolution
  - dns.googleapis.com
  # Needed for HTTPS Internal Load Balancer certificates
  - certificatemanager.googleapis.com
  - privateca.googleapis.com
  # Needed for Service Directory Private Network Access
  - servicedirectory.googleapis.com

org_policies:
  compute.restrictSharedVpcSubnetworks:
    rules:
      - allow:
          values:
            - projects/${try(projects["host"], networking_config["host_project_id"])}/regions/${networking_config["region"]}/subnetworks/${networking_config["subnet_name"]}

buckets:
  iac-state:
    description: Terraform state bucket
    iam:
      roles/storage.objectAdmin:
        - $iam_principals:service_accounts/_self_/iac-rw

service_accounts:
  # Automation SAs
  iac-rw:
    iam_bindings_additive:
      cloud-run-token-creator:
        member: $iam_principals:service_agents/_self_/cloudrun
        role: roles/iam.serviceAccountTokenCreator
    iam_sa_roles:
      $service_account_ids:_self_/gecx-as-0:
        - roles/iam.serviceAccountUser
      $service_account_ids:_self_/gecx-as-build-0:
        - roles/iam.serviceAccountUser
      $service_account_ids:_self_/crun-private-0:
        - roles/iam.serviceAccountUser
      $service_account_ids:_self_/crun-private-build-0:
        - roles/iam.serviceAccountUser
  # Cloud Function SAs
  gecx-as-0: {}
  gecx-as-build-0: {}
  # Cloud Run Private Tool SAs
  crun-private-0: {}
  crun-private-build-0: {}

# Grant roles
iam_by_principals:
  $iam_principals:service_accounts/_self_/iac-rw:
    - roles/ces.admin
    - roles/discoveryengine.admin
    # For build bucket creation.
    # Not needed if the application is configured via GUI.
    - roles/storage.admin
    # Needed to create Cloud Functions / Cloud Run
    - roles/cloudfunctions.admin
    # Needed for DNS zones
    - roles/dns.admin
    # Needed for HTTPS ILBs
    - roles/certificatemanager.owner
    - roles/compute.loadBalancerAdmin
    - roles/privateca.admin
    # Needed for Service Directory
    - roles/servicedirectory.admin
    - roles/serviceusage.serviceUsageConsumer
  # The following role assignments are used for Cloud Function / Cloud Run execution
  $iam_principals:service_accounts/_self_/gecx-as-0:
    - roles/logging.logWriter
    - roles/storage.objectViewer
    - roles/artifactregistry.writer
  $iam_principals:service_accounts/_self_/gecx-as-build-0:
    - roles/run.builder
    - roles/artifactregistry.reader
  $iam_principals:service_accounts/_self_/crun-private-0:
    - roles/logging.logWriter
    - roles/storage.objectViewer
  $iam_principals:service_accounts/_self_/crun-private-build-0:
    - roles/run.builder
    - roles/artifactregistry.reader
  $iam_principals:service_agents/_self_/certificatemanager:
    - roles/privateca.certificateRequester
  $iam_principals:service_agents/_self_/ces:
    - roles/servicedirectory.pscAuthorizedService
    - roles/servicedirectory.viewer
  $iam_principals:service_agents/_self_/dialogflow:
    - roles/servicedirectory.pscAuthorizedService
    - roles/servicedirectory.viewer
