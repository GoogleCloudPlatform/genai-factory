# Global exclusions (combining your previous exclusions and tool-specific ones)
exclude: ^(\.terraform/|\.venv/|templates/)

repos:
  # End of file empty line and removal of trailing spaces
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
        name: "Adding empty lines at the EOF"
      - id: trailing-whitespace
        name: "Removing trailing spaces at the end of lines"
        args: [--markdown-linebreak-ext=md]

  # Terraform Formatting & Linting
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
        name: "Formatting Terraform code"
      - id: terraform_tflint
        name: "Linting Terraform code"
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl

  # YAML Linting
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: "Linting yaml files"
        args: [-c, .yamllint]

  # Spelling Checks
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        name: "Check words spelling"

  # YAPF (Python Formatting)
  - repo: https://github.com/google/yapf
    rev: v0.43.0
    hooks:
      - id: yapf
        name: "Checking Python files formatting"

  # Custom Local Tools (Running via your uv environment)
  - repo: local
    hooks:
      - id: check-boilerplate
        name: "Checking copyright boilerplate is present in all relevant files"
        entry: |
          uv run python tools/check_boilerplate.py . --exclude-file gecx-dialogflow/1-apps/templates/outputs.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: check-documentation
        name: "Checking documentation respects genai-factory standards"
        entry: |
          uv run python tools/check_documentation.py . --show-diffs --no-show-summary
        language: system
        pass_filenames: false
        always_run: true

      - id: check-links
        name: "Checking all links are valid"
        entry: |
          uv run python tools/check_links.py . --no-show-summary --exclude ./gecx-dialogflow/1-apps/data/ds-kb
        language: system
        pass_filenames: false
        always_run: true
